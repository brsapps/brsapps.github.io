<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Color Sudoku</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
  
  <!-- Open Graph metadata -->
  <meta property="og:title" content="Color Sudoku Oyunu Paylaşıldı">
  <meta property="og:description" content="Senin için bir Color Sudoku oyunu hazırladım! Bakalım çözebilecek misin?">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icon.png">
  
  <style>
    :root {
      --primary: #ffee00;
      --bg: #0d0e12;
      --card-bg: rgba(25, 27, 38, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-muted: #8b92b6;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(254, 238, 0, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(0, 198, 255, 0.04) 0%, transparent 40%);
      color: var(--text);
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    /* Glow backdrop element */
    .glow-backdrop {
      position: absolute;
      width: 300px;
      height: 300px;
      background: var(--primary);
      filter: blur(120px);
      opacity: 0.15;
      border-radius: 50%;
      z-index: 1;
      pointer-events: none;
      animation: pulse 6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.12; }
      100% { transform: scale(1.2); opacity: 0.2; }
    }

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 400px;
      padding: 40px 24px;
      border-radius: 24px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-icon-wrapper {
      position: relative;
      margin-bottom: 24px;
      width: 96px;
      height: 96px;
      border-radius: 24px;
      padding: 3px;
      background: linear-gradient(135deg, var(--primary), #00c6ff);
      box-shadow: 0 8px 24px rgba(254, 238, 0, 0.25);
      animation: float 4s ease-in-out infinite;
    }

    .app-icon {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 21px;
      background-color: #121214;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    .app-title {
      font-family: 'Righteous', sans-serif;
      font-size: 28px;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #ffffff 60%, #e0e0e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-title {
      font-size: 17px;
      font-weight: 600;
      color: #ffffff;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    .status-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 32px;
      max-width: 280px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 52px;
      font-size: 16px;
      font-weight: 800;
      color: #0b0e12;
      background: linear-gradient(135deg, var(--primary), #ffd700);
      border: none;
      border-radius: 14px;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(254, 238, 0, 0.3);
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(254, 238, 0, 0.45);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .spinner {
      border: 3px solid rgba(255,255,255,0.06);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border-left-color: var(--primary);
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="glow-backdrop"></div>
  
  <div class="container">
    <div class="app-icon-wrapper">
      <img class="app-icon" src="icon.png" alt="Color Sudoku Icon" onerror="this.style.display='none';">
    </div>
    
    <h1 class="app-title">Color Sudoku</h1>
    
    <div class="spinner" id="spinner"></div>
    <h2 class="status-title" id="status-title">Oyun Yükleniyor...</h2>
    <p class="status-desc" id="status-desc">Oyun otomatik olarak açılmadıysa aşağıdaki butonla devam edebilirsiniz.</p>
    
    <a id="redirect-btn" class="btn" href="#">Oyunu Başlat</a>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const sharedState = urlParams.get('sharedState') || '';
    const type = urlParams.get('type') || 'normal';
    const expoUrlParam = urlParams.get('expoUrl') || '';

    // Custom simple base64 implementation matching the app's encoder
    function base64Decode(str) {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_';
      const cleanStr = str.replace(/=/g, '');
      const bytes = [];
      let buffer = 0;
      let bits = 0;
      for (let i = 0; i < cleanStr.length; i++) {
        const char = cleanStr[i];
        const val = chars.indexOf(char);
        if (val === -1) continue;
        buffer = (buffer << 6) | val;
        bits += 6;
        if (bits >= 8) {
          bits -= 8;
          bytes.push((buffer >> bits) & 0xff);
        }
      }

      let result = '';
      let i = 0;
      while (i < bytes.length) {
        const b1 = bytes[i++];
        if (b1 < 0x80) {
          result += String.fromCharCode(b1);
        } else if (b1 > 0xbf && b1 < 0xe0) {
          const b2 = bytes[i++];
          result += String.fromCharCode(((b1 & 0x1f) << 6) | (b2 & 0x3f));
        } else if (b1 > 0xdf && b1 < 0xf0) {
          const b2 = bytes[i++];
          const b3 = bytes[i++];
          result += String.fromCharCode(((b1 & 0x0f) << 12) | ((b2 & 0x3f) << 6) | (b3 & 0x3f));
        } else {
          const b2 = bytes[i++];
          const b3 = bytes[i++];
          const b4 = bytes[i++];
          let utf32 = ((b1 & 0x07) << 18) | ((b2 & 0x3f) << 12) | ((b3 & 0x3f) << 6) | (b4 & 0x3f);
          utf32 -= 0x10000;
          result += String.fromCharCode(0xd800 + (utf32 >> 10), 0xdc00 + (utf32 & 0x3ff));
        }
      }
      return result;
    }

    function validateSharedState(encoded) {
      if (!encoded) return false;
      try {
        const jsonStr = base64Decode(encoded);
        const parsed = JSON.parse(jsonStr);
        if (!parsed || typeof parsed !== 'object') return false;
        if (!Array.isArray(parsed.g) || !Array.isArray(parsed.s) || !Array.isArray(parsed.f)) return false;
        if (typeof parsed.mo !== 'string' || typeof parsed.gi !== 'string') return false;
        const rows = parsed.g.length;
        if (rows === 0 || !Array.isArray(parsed.g[0])) return false;
        return true;
      } catch (e) {
        return false;
      }
    }

    const isValid = validateSharedState(sharedState);
    let schemeUrl = '';

    if (isValid) {
      if (expoUrlParam) {
        schemeUrl = type === 'color'
          ? `${expoUrlParam}/--/sudoku/colorsudokugame?sharedState=${sharedState}`
          : `${expoUrlParam}/--/sudoku/normalsudokugame?sharedState=${sharedState}`;
      } else {
        schemeUrl = type === 'color'
          ? `colorsudoku://sudoku/colorsudokugame?sharedState=${sharedState}`
          : `colorsudoku://sudoku/normalsudokugame?sharedState=${sharedState}`;
      }
    } else {
      // Just open the app if sharedState is invalid/fake or not provided
      schemeUrl = expoUrlParam ? expoUrlParam : 'colorsudoku://';
    }

    document.getElementById('redirect-btn').href = schemeUrl;
    if (!isValid) {
      document.getElementById('redirect-btn').textContent = "Uygulamayı Aç";
    }

    // Auto-redirect only if valid
    if (isValid) {
      window.location.href = schemeUrl;
    }

    // Fallback UI update
    setTimeout(() => {
      document.getElementById('spinner').style.display = 'none';
      if (isValid) {
        document.getElementById('status-title').textContent = "Oyuna Katılın";
        document.getElementById('status-desc').textContent = `Paylaşılan ${type === 'color' ? 'Color' : 'Klasik'} Sudoku oyununu oynamak için yukarıdaki butona dokunun.`;
      } else {
        document.getElementById('status-title').textContent = "Uygulamayı Açın";
        document.getElementById('status-desc').textContent = "Uygulamaya gitmek için yukarıdaki butona dokunun.";
      }
    }, 2500);
  </script>
</body>
</html>
